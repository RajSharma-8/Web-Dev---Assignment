<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JeevanSaathi Form</title>
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>
<body>
<div class="form-container">
  <h2>Find Your Life Partner</h2>
  <form action="mailto:matches@jeevansaathi.com" method="POST">
    <div class="form-group">
      <label for="gender">I am a:</label>
      <select id="gender" name="gender" required>
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>

    <div class="form-group">
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" placeholder="e.g. 25" min="18" max="100" required>
    </div>

    <div class="form-group">
      <label for="religion">Religion:</label>
      <select id="religion" name="religion" required>
        <option value="">Select</option>
        <option value="hindu">Hindu</option>
        <option value="muslim">Muslim</option>
        <option value="christian">Christian</option>
        <option value="sikh">Sikh</option>
      </select>
    </div>

    <div class="form-group">
      <label for="mother-tongue">Mother Tongue:</label>
      <select id="mother-tongue" name="mother-tongue">
        <option value="">Select</option>
        <option value="hindi">Hindi</option>
        <option value="english">English</option>
        <option value="tamil">Tamil</option>
        <option value="bengali">Bengali</option>
      </select>
    </div>

    <div class="form-group">
      <label for="location">Location:</label>
      <input type="text" id="location" name="location" placeholder="City or State">
    </div>

    <button type="submit">Search Matches</button>
  </form>
</div>
</body>
</html>
